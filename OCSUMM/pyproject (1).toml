[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "prompt-injection-detector"
version = "0.1.0"
description = "Prompt injection detector, red-team generator, adversarial training loop, and Streamlit demo."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Prompt Injection Detector Team" }]
dependencies = [
    "joblib>=1.3",
    "matplotlib>=3.8",
    "numpy>=1.24",
    "pandas>=2.0",
    "pydantic>=2.0",
    "rich>=13.0",
    "scikit-learn>=1.3",
    "scipy>=1.10",
    "typer>=0.9",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
app = ["streamlit>=1.34"]
hf = [
    "datasets>=2.18",
    "transformers>=4.40",
    "torch>=2.2",
    "evaluate>=0.4",
    "sentence-transformers>=3.0",
]
llm = [
    "cohere>=5.0",
    "google-genai>=1.0",
    "openai>=1.30",
]
dev = ["pytest>=8.0", "ruff>=0.4"]

[project.scripts]
pid = "prompt_injection_detector.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"
