  clean_samples: 750
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

training:
  decision_threshold: 0.40
  random_seed: 42

adversarial_loop:
  iterations: 3
  min_evasion_variants: 5

redteam:
  strategies:
