    - obfuscate
    - roleplay
    - encode
    - nested

robustness:
  edge_cases:
    - base64
    - unicode
    - multiturn
    - diluted

paths:
  artifacts_dir: artifacts
  reports_dir: reports
  data_processed: data/processed/dataset.csv
